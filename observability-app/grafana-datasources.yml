apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      derivedFields:
        - datasourceUid: 'Tempo'
          matcherType: label
          matcherRegex: "trace_id"
          name: TraceID
          url: "$${__value.raw}"
        - name: Filter TraceID
          matcherType: label
          matcherRegex: "trace_id"
          url: '/explore?left=["now-1h","now","Loki",{"expr":"{service_name=\"dice-go-app\"} | trace_id=\"$${__value.raw}\""}]'

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: 'Loki'
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        tags: [{ key: 'service.name', value: 'service_name' }]
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        query: '{$${__tags}} | trace_id="$${__trace.traceId}"'
